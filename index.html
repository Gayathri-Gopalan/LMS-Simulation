<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glycolysis — Interactive Simulation</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
:root{
  --bg:#0a0e1a;--panel:#111827;--panel2:#1a2235;--border:#2a3550;
  --accent:#22d3ee;--accent2:#f472b6;--green:#4ade80;--red:#f87171;--amber:#fbbf24;
  --text:#e2e8f0;--muted:#94a3b8;
  --font:'DM Sans',sans-serif;--mono:'Space Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}

/* ── WELCOME ── */
.welcome-bg{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 40%,#0f2a4a 0%,#0a0e1a 60%);display:flex;align-items:center;justify-content:center}
.welcome-content{text-align:center;max-width:660px;padding:24px}
.welcome-title{font-size:68px;font-weight:700;letter-spacing:-3px;line-height:1;margin-bottom:14px}
.welcome-title span{color:var(--accent)}
.welcome-sub{color:var(--muted);font-size:19px;margin-bottom:44px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.mode-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:26px 22px;cursor:pointer;transition:all .25s;text-align:left}
.mode-card:hover{transform:translateY(-4px)}
.mc-learn:hover{border-color:#60a5fa}.mc-practice:hover{border-color:#4ade80}.mc-quiz:hover{border-color:#fbbf24}
.mc-icon{font-size:34px;margin-bottom:12px}.mc-title{font-size:21px;font-weight:700}.mc-desc{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.55}

/* ── APP SHELL — wider centre, no separate right sidebar ── */
.app{display:grid;grid-template-columns:185px 1fr;height:100vh}
.sidebar{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:10px 12px;background:var(--panel2);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.sb-body{flex:1;overflow-y:auto;padding:6px}
.sb-body::-webkit-scrollbar{width:3px}.sb-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.tool-item{padding:8px 9px;margin:3px 0;background:var(--panel2);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .18s}
.tool-item:hover:not(.used):not(.disabled){border-color:var(--accent);background:rgba(34,211,238,.06);transform:translateX(2px)}
.tool-item.selected{border-color:var(--green);background:rgba(74,222,128,.1)}
.tool-item.highlight{border-color:var(--amber);background:rgba(251,191,36,.1);animation:hPulse 1.2s infinite}
.tool-item.used{opacity:.25;cursor:not-allowed}
.tool-item.disabled{opacity:.4;cursor:not-allowed}
.tool-item.shake{animation:shake .3s}
.ti-row{display:flex;align-items:center;gap:6px}
.ti-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ti-name{font-size:13px;font-weight:600}
.ti-full{font-size:10px;color:var(--muted);margin-top:2px}

/* ── CENTRE COLUMN ── */
.center{display:flex;flex-direction:column;overflow:hidden}

/* ── STEP BANNER (top, full-width, prominent) ── */
.step-banner{background:linear-gradient(90deg,#0c1e38 0%,#0a1628 100%);border-bottom:2px solid var(--accent);padding:12px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.step-num-circle{width:48px;height:48px;border-radius:50%;background:var(--accent);color:#0a0e1a;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;font-family:var(--mono);flex-shrink:0}
.step-main{flex:1;min-width:0}
.step-title-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.step-title{font-size:19px;font-weight:700;color:#fff}
.step-enz{font-size:12px;color:var(--muted);font-style:italic}
.step-rxn{font-size:11px;color:var(--accent);font-family:var(--mono);margin-top:3px;letter-spacing:.3px}
.step-tags{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
.step-tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px}
.st-neg{background:rgba(248,113,113,.18);color:var(--red);border:1px solid rgba(248,113,113,.35)}
.st-pos{background:rgba(74,222,128,.18);color:var(--green);border:1px solid rgba(74,222,128,.35)}
.st-nadh{background:rgba(34,211,238,.18);color:var(--accent);border:1px solid rgba(34,211,238,.35)}
.st-irrev{background:rgba(251,191,36,.18);color:var(--amber);border:1px solid rgba(251,191,36,.35)}
.st-reg{background:rgba(244,114,182,.18);color:var(--accent2);border:1px solid rgba(244,114,182,.35)}
.st-prep{background:rgba(248,113,113,.12);color:#fca5a5;border:1px solid rgba(248,113,113,.25)}
.st-payoff{background:rgba(74,222,128,.12);color:#86efac;border:1px solid rgba(74,222,128,.25)}
.energy-bar{display:flex;gap:8px;align-items:center;flex-shrink:0}
.e-pill{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;display:flex;flex-direction:column;align-items:center;min-width:76px;transition:all .3s}
.e-pill.pop{animation:pop .4s ease;border-color:var(--accent)}
.e-label{font-size:8px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.e-val{font-size:20px;font-weight:700;font-family:var(--mono);line-height:1.2}
.ev-green{color:var(--green)}.ev-red{color:var(--red)}.ev-cyan{color:var(--accent)}

/* ── DETAIL DRAWER (collapsible, below banner) ── */
.detail-drawer{background:#0a1628;border-bottom:1px solid var(--border);flex-shrink:0;overflow:hidden;transition:max-height .3s ease}
.detail-drawer.open{max-height:130px}
.detail-drawer.closed{max-height:0}
.detail-inner{padding:8px 20px 10px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-col{}
.d-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.d-val{font-size:11px;color:var(--text);line-height:1.5}
.d-note{font-size:10px;color:var(--amber);background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.2);border-radius:5px;padding:5px 8px;line-height:1.5}
.drawer-toggle{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);padding:4px;font-size:10px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;transition:color .2s}
.drawer-toggle:hover{color:var(--accent)}

/* ── PRACTICE INSTRUCTION STRIP (inline, above diagram) ── */
.pract-strip{background:rgba(251,191,36,.07);border-bottom:1px solid rgba(251,191,36,.25);padding:8px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.pract-strip-steps{display:flex;gap:8px;align-items:center}
.ps-step{display:flex;align-items:center;gap:5px;font-size:11px}
.ps-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;font-family:var(--mono)}
.ps-num.active{background:var(--accent);color:#0a0e1a}
.ps-num.done{background:var(--green);color:#0a0e1a}
.ps-num.idle{background:var(--panel2);color:var(--muted);border:1px solid var(--border)}
.ps-text{color:var(--muted)}
.ps-text.active{color:var(--text);font-weight:600}
.ps-arrow{color:var(--border);font-size:10px}
.pract-instr{flex:1;font-size:12px;font-weight:600;color:var(--amber);text-align:right}
.pract-attempts{font-size:10px;color:var(--red);margin-left:8px}

/* ── PLAY AREA ── */
.play-area{flex:1;position:relative;background:radial-gradient(ellipse at 50% 50%,#0d1b2e 0%,#0a0e1a 100%);overflow:hidden;min-height:0}
.play-area::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(34,211,238,.04) 1px,transparent 1px);background-size:24px 24px;pointer-events:none}
.play-area svg{position:absolute;inset:0;width:100%;height:100%}

/* ── PROGRESS BAR ── */
.progress-bar{background:var(--panel2);border-top:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.prog-label{font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
.prog-dots{display:flex;gap:5px;flex:1}
.prog-dot{flex:1;height:6px;border-radius:3px;background:var(--border);cursor:pointer;transition:all .3s;position:relative}
.prog-dot:hover{background:#3a4a6a}
.prog-dot.done{background:var(--green)}.prog-dot.now{background:var(--amber);animation:dotBlink 1s infinite}
.prog-dot.irrev::after{content:'';position:absolute;top:-4px;right:1px;width:4px;height:4px;background:var(--red);border-radius:50%}

/* ── CONTROLS ── */
.controls{background:var(--panel);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;flex-shrink:0}
.btn{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#0a0e1a}
.btn.primary:hover:not(:disabled){background:#67e8f9;color:#0a0e1a}
.btn.danger{border-color:rgba(248,113,113,.4);color:var(--red)}
.btn.danger:hover:not(:disabled){background:rgba(248,113,113,.1)}
.btn.success{background:var(--green);border-color:var(--green);color:#0a0e1a}
.speed-ctrl{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted)}
.speed-ctrl input{width:60px;accent-color:var(--accent)}
.hint-ctrl{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);cursor:pointer}
.hint-ctrl input{accent-color:var(--accent)}
.kbd{display:inline-flex;align-items:center;gap:3px;font-size:9px;color:var(--muted);font-family:var(--mono);background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:1px 4px}

/* ── TOAST ── */
.toast{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:10px;font-size:12px;font-weight:600;animation:toastIn .3s ease;max-width:340px;text-align:center;pointer-events:none;z-index:100}
.toast.ok{background:var(--green);color:#0a0e1a}
.toast.err{background:var(--red);color:#fff}
.toast.hint{background:var(--panel2);border:1px solid var(--amber);color:var(--amber);font-size:10px;white-space:normal;max-width:300px}

/* ── OVERLAY (instructions, summary table) ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column}
.overlay-box::-webkit-scrollbar{width:4px}.overlay-box::-webkit-scrollbar-thumb{background:var(--border)}
.overlay-head{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--panel);z-index:1;flex-shrink:0}
.overlay-head h2{font-size:18px;font-weight:700}
.overlay-close{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px}
.overlay-close:hover{border-color:var(--red);color:var(--red)}
.overlay-body{padding:20px 24px;overflow-y:auto}
.instr-sec{margin-bottom:18px}
.instr-title{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid rgba(34,211,238,.2)}
.instr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.instr-card{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px}
.ic-icon{font-size:20px;margin-bottom:5px}.ic-title{font-size:12px;font-weight:700;margin-bottom:3px}.ic-desc{font-size:10px;color:var(--muted);line-height:1.5}
.instr-step{display:flex;gap:10px;margin-bottom:9px;align-items:flex-start}
.isn{width:21px;height:21px;border-radius:50%;background:rgba(34,211,238,.15);border:1px solid rgba(34,211,238,.3);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;font-family:var(--mono)}
.ist{font-size:11px;color:var(--text);line-height:1.5;padding-top:2px}
.key-facts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.kf{background:var(--panel2);border-radius:6px;padding:8px 10px;font-size:10px;line-height:1.5}
.kf strong{display:block;color:var(--accent);font-size:11px;margin-bottom:2px}
.legend-grid{display:flex;flex-direction:column;gap:6px}
.legend-row{display:flex;align-items:center;gap:8px;font-size:10px}

/* ── SUMMARY TABLE ── */
.sum-table{width:100%;border-collapse:collapse;font-size:11px}
.sum-table th{background:var(--panel2);padding:8px 10px;text-align:left;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.sum-table td{padding:7px 10px;border-bottom:1px solid rgba(42,53,80,.5);color:var(--text);vertical-align:top}
.sum-table tr:hover td{background:rgba(34,211,238,.03)}
.sum-table .tag{display:inline-block;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;font-family:var(--mono)}
.sum-table .irr{background:rgba(251,191,36,.15);color:var(--amber)}
.sum-table .atp-n{color:var(--red)}.sum-table .atp-p{color:var(--green)}.sum-table .nh{color:var(--accent)}
.sum-table .prep-row td:first-child{border-left:2px solid rgba(248,113,113,.4)}
.sum-table .payoff-row td:first-child{border-left:2px solid rgba(74,222,128,.4)}

/* ── COMPLETE SCREEN ── */
.complete-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;max-width:440px;width:100%;padding:28px;text-align:center}
.complete-title{font-size:26px;font-weight:700;margin-bottom:6px}
.complete-sub{font-size:13px;color:var(--muted);margin-bottom:18px}
.complete-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.cs{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 6px}
.cs-val{font-size:22px;font-weight:700;font-family:var(--mono)}.cs-lbl{font-size:8px;color:var(--muted);margin-top:2px}
.complete-next{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:left;font-size:10px;color:var(--muted);margin-bottom:14px;line-height:1.7}
.complete-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}

/* ── QUIZ ── */
.quiz-wrap{display:flex;flex-direction:column;height:100vh;background:var(--bg)}
.quiz-head{background:var(--panel);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.quiz-head h2{font-size:17px;font-weight:700}
.qh-sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.quiz-body{flex:1;overflow-y:auto;padding:20px;max-width:720px;width:100%;margin:0 auto}
.quiz-body::-webkit-scrollbar{width:4px}.quiz-body::-webkit-scrollbar-thumb{background:var(--border)}
.q-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px}
.q-cat{font-size:8px;font-weight:700;color:var(--accent2);letter-spacing:1px;text-transform:uppercase;font-family:var(--mono);margin-bottom:4px}
.q-num{font-size:9px;font-weight:700;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--mono);margin-bottom:7px}
.q-text{font-size:14px;font-weight:600;margin-bottom:13px;line-height:1.5}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.q-opt{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 13px;font-size:12px;cursor:pointer;transition:all .18s;text-align:left;display:flex;align-items:center;gap:8px;font-family:var(--font);color:var(--text);width:100%}
.q-opt:hover:not(.locked){border-color:var(--accent);background:rgba(34,211,238,.06)}
.q-opt.correct{border-color:var(--green)!important;background:rgba(74,222,128,.1)!important;color:var(--green)!important}
.q-opt.wrong{border-color:var(--red)!important;background:rgba(248,113,113,.1)!important;color:var(--red)!important}
.q-opt.locked{cursor:default}
.q-opt-letter{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--mono);flex-shrink:0}
.q-exp{margin-top:11px;background:rgba(34,211,238,.06);border:1px solid rgba(34,211,238,.2);border-radius:8px;padding:10px 12px;font-size:11px;color:var(--muted);line-height:1.5}
.q-exp strong{color:var(--accent)}
.quiz-score-box{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:16px 20px;text-align:center;margin-bottom:14px}
.qs-val{font-size:40px;font-weight:700;font-family:var(--mono);color:var(--accent)}
.qs-lbl{font-size:12px;color:var(--muted);margin-top:4px}
.score-badge{background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.3);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--accent);font-family:var(--mono)}

/* ── ANIMATIONS ── */
@keyframes hPulse{0%,100%{border-color:var(--amber)}50%{border-color:transparent}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes appear{0%{opacity:0;transform:scale(.7)}60%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 4px var(--accent))}50%{filter:drop-shadow(0 0 10px var(--accent))}}
@keyframes enzSlide{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatUp{0%{opacity:1;transform:translate(-50%,-10px)}100%{opacity:0;transform:translate(-50%,-40px)}}
@keyframes particlePop{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(2.5)}}
@keyframes streak{0%{transform:scale(1)}40%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes timerWarn{0%,100%{opacity:1}50%{opacity:.4}}
.appear{animation:appear .35s ease-out}
.glow{animation:glow 2s infinite}
.enz-appear{animation:enzSlide .3s ease-out}

/* ── ENERGY GRAPH (ATP balance line chart) ── */
.energy-graph{background:rgba(10,14,26,.6);border-top:1px solid var(--border);padding:4px 20px 5px;flex-shrink:0;display:flex;align-items:center;gap:10px}
.eg-label{font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.eg-svg{flex:1;height:28px;display:block}

/* ── STREAK BADGE ── */
.streak-badge{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;font-family:var(--mono);border:1px solid rgba(74,222,128,.4);background:rgba(74,222,128,.1);color:var(--green);flex-shrink:0;animation:streak .4s ease}

/* ── ΔG TOOLTIP on irreversible tag ── */
.dg-tooltip{position:relative;display:inline-block}
.dg-tooltip .dg-tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:10px;color:var(--text);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:50;font-family:var(--mono)}
.dg-tooltip:hover .dg-tip{opacity:1}

/* ── FLOAT-UP ATP ANIMATION node ── */
.atp-float{position:absolute;left:50%;font-size:13px;font-weight:700;font-family:var(--mono);pointer-events:none;animation:floatUp .9s ease-out forwards}
.atp-float.pos{color:var(--green)}
.atp-float.neg{color:var(--red)}

/* ── TIMED QUIZ EXTRAS ── */
.q-timer-bar{height:3px;border-radius:2px;background:var(--accent);transition:width .1s linear;margin-bottom:12px}
.q-timer-bar.warn{background:var(--amber);animation:timerWarn .5s infinite}
.q-timer-bar.crit{background:var(--red);animation:timerWarn .3s infinite}
.q-mode-toggle{display:flex;gap:8px;align-items:center;margin-bottom:16px;padding:12px 16px;background:var(--panel2);border:1px solid var(--border);border-radius:10px}
.q-mode-toggle label{font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px}
.q-mode-toggle input{accent-color:var(--accent)}
.q-retry-only{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--amber);margin-bottom:12px}

/* ── COMPARE STEPS PANEL ── */
.compare-panel{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:6px}
.compare-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.compare-cell{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px}
.compare-cell .cc-step{font-size:9px;font-weight:700;color:var(--accent);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.compare-cell .cc-title{font-size:13px;font-weight:700;margin-bottom:6px}
.compare-cell .cc-row{font-size:10px;color:var(--muted);margin:3px 0;display:flex;gap:6px}
.compare-cell .cc-row strong{color:var(--text);min-width:70px}
.compare-diff{background:rgba(34,211,238,.06);border:1px solid rgba(34,211,238,.2);border-radius:6px;padding:8px 10px;font-size:10px;color:var(--muted);margin-top:8px;line-height:1.6}

/* ── PERSISTENCE INDICATOR ── */
.persist-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;opacity:0.7}
.persist-dot.stale{background:var(--amber)}
</style>

<script>

/* ── STEP DATA ─────────────────────────────────────────────────────────────────
   Scientific fixes applied:
   - Phases: steps 1-5 = Preparatory, steps 6-10 = Pay-off (NCERT/NEET standard)
   - Fluoride mechanism corrected: F⁻ + Pᵢ → fluorophosphate (PO₂F²⁻), chelates Mg²⁺
   - PFK-1 description: irreversibility is kinetic/thermodynamic, not absolute chemical
   - Complete screen: NADH noted as cytoplasmic
   ─────────────────────────────────────────────────────────────────────────── */
var STEPS=[
  {id:1,enz:'Hexokinase',prod:'g6p',atp:-1,nadh:0,rev:false,phase:'prep',regulatory:false,deltaG:'-16.7',
   title:'Phosphorylation of Glucose',enzFull:'Hexokinase (HK)',
   subFull:'Glucose',prodFull:'Glucose-6-Phosphate (G6P)',subC:'6C',prodC:'6C',
   rxn:'Glucose + ATP \u2192 G6P + ADP + H\u207a',
   detail:'Hexokinase adds a phosphate group from ATP to carbon-6, trapping glucose inside the cell as G6P (the charged phosphate cannot cross the plasma membrane). Irreversible under cellular conditions (\u0394G = \u221216.7 kJ/mol). Hexokinase is product-inhibited by G6P — a simple feedback mechanism.',
   note:'Product-inhibited by G6P; commits glucose to glycolysis or glycogen synthesis',
   misconception:'Hexokinase (not PFK-1) catalyses the FIRST phosphorylation. G6P stays in the cell because the phosphate charge prevents membrane crossing.'},
  {id:2,enz:'PGI',prod:'f6p',atp:0,nadh:0,rev:true,phase:'prep',regulatory:false,
   title:'Isomerisation to Fructose-6-P',enzFull:'Phosphoglucose Isomerase (PGI)',
   subFull:'Glucose-6-Phosphate (G6P)',prodFull:'Fructose-6-Phosphate (F6P)',subC:'6C',prodC:'6C',
   rxn:'G6P \u21cc F6P',
   detail:'PGI converts the aldose G6P to the ketose F6P by shifting the carbonyl group from C-1 to C-2. This isomerisation is essential for two reasons: (1) PFK-1\'s active site is specific for a ketose substrate — it cannot act on the aldose G6P directly; and (2) the resulting ketose symmetry is required for Aldolase (step 4) to perform its aldol-cleavage mechanism. Without this rearrangement, neither PFK-1 nor Aldolase can act.',
   note:'Aldose (G6P) \u2192 Ketose (F6P); prepares molecule for both PFK-1 phosphorylation and Aldolase cleavage',
   misconception:'PGI only rearranges atoms within the same molecule. No phosphate is added or removed; the 6-carbon skeleton is unchanged.'},
  {id:3,enz:'PFK-1',prod:'f16bp',atp:-1,nadh:0,rev:false,phase:'prep',regulatory:true,deltaG:'-14.2',
   title:'Committed Step — PFK-1',enzFull:'Phosphofructokinase-1 (PFK-1)',
   subFull:'Fructose-6-Phosphate (F6P)',prodFull:'Fructose-1,6-Bisphosphate (F1,6BP)',subC:'6C',prodC:'6C',
   rxn:'F6P + ATP \u2192 F1,6BP + ADP + H\u207a',
   detail:'The key regulatory step. PFK-1 is allosterically inhibited by ATP and citrate (high energy state) and activated by AMP, ADP and fructose-2,6-bisphosphate (F2,6BP — the most potent activator). Once F1,6BP is formed, the cell is committed to glycolysis under physiological conditions (\u0394G = \u221214.2 kJ/mol makes reversal negligible, though fructose-1,6-bisphosphatase can hydrolyse it in gluconeogenesis).',
   note:'Rate-limiting enzyme; inhibited by ATP/citrate; activated by AMP/F2,6BP (super-activator)',
   misconception:'PFK-1 — not Hexokinase — is the rate-limiting committed step. The irreversibility is thermodynamic under cellular conditions, not an absolute chemical impossibility.'},
  {id:4,enz:'Aldolase',prod:'dhap_g3p',atp:0,nadh:0,rev:true,phase:'prep',regulatory:false,
   title:'Cleavage to Two Trioses',enzFull:'Aldolase',
   subFull:'Fructose-1,6-Bisphosphate (F1,6BP)',prodFull:'DHAP + Glyceraldehyde-3-P',subC:'6C',prodC:'3C+3C',
   rxn:'F1,6BP \u21cc DHAP + G3P',
   detail:'Aldolase cleaves the C3\u2013C4 bond of F1,6BP to produce DHAP (C1\u2013C3) and glyceraldehyde-3-phosphate (G3P, C4\u2013C6). One glucose is now two 3-carbon fragments. However, only G3P can directly enter the pay-off phase — DHAP must first be converted to G3P by TPI (step 5). Once TPI acts, both fragments proceed, and all subsequent ATP/NADH yields are \u00d72 per glucose.',
   note:'6C \u2192 3C + 3C; yields \u00d72 only after TPI (step 5) converts DHAP \u2192 G3P',
   misconception:'Aldolase cleaves (splits) the molecule — it does NOT add or remove phosphate. The two products carry the original phosphates from steps 1 and 3.'},
  {id:5,enz:'TPI',prod:'g3p_x2',atp:0,nadh:0,rev:true,phase:'prep',regulatory:false,
   title:'Interconversion of Trioses',enzFull:'Triose Phosphate Isomerase (TPI)',
   subFull:'DHAP (the isomerised triose half)',prodFull:'2 \u00d7 Glyceraldehyde-3-P',subC:'3C',prodC:'3C\u00d72',
   rxn:'DHAP \u21cc G3P',
   detail:'TPI is a "catalytically perfect" enzyme (k_cat/K_M \u2248 diffusion limit, ~10\u2078 M\u207b\u00b9s\u207b\u00b9). It converts DHAP to G3P so both triose halves enter the energy-releasing steps. Equilibrium favours DHAP (~96%), but GAPDH constantly removes G3P, pulling the reaction forward by Le Chatelier\'s principle.',
   note:'Near-perfect enzyme; both triose halves now enter the pay-off phase',
   misconception:"Without TPI, the DHAP half is wasted. TPI enables 100% of glucose carbon to yield energy. This is the last step of the preparatory phase."},
  {id:6,enz:'GAPDH',prod:'bpg13',atp:0,nadh:2,rev:true,phase:'payoff',regulatory:false,
   title:'Oxidation and Phosphorylation',enzFull:'Glyceraldehyde-3-P Dehydrogenase (GAPDH)',
   subFull:'2 \u00d7 G3P',prodFull:'2 \u00d7 1,3-Bisphosphoglycerate (1,3-BPG)',subC:'3C\u00d72',prodC:'3C\u00d72',
   rxn:'2 G3P + 2 NAD\u207a + 2 P\u1d62 \u2192 2 (1,3-BPG) + 2 NADH + 2 H\u207a',
   detail:'The ONLY oxidation (redox) step in glycolysis. GAPDH oxidises G3P — transferring electrons to NAD\u207a to form NADH — while simultaneously adding free inorganic phosphate (P\u1d62), NOT ATP, to create a high-energy acyl-phosphate bond in 1,3-BPG. Each NADH carries electrons worth ~2.5 ATP in the electron transport chain (cytoplasmic NADH via the malate-aspartate shuttle).',
   note:'Uses free P\u1d62, not ATP; only redox step; produces cytoplasmic NADH (~2.5 ATP equivalent each)',
   misconception:'GAPDH uses FREE inorganic phosphate (P\u1d62), not ATP. This is the only oxidation step. The two NADH produced here are cytoplasmic.'},
  {id:7,enz:'PGK',prod:'pg3',atp:2,nadh:0,rev:true,phase:'payoff',regulatory:false,
   title:'First ATP Payoff',enzFull:'Phosphoglycerate Kinase (PGK)',
   subFull:'2 \u00d7 1,3-Bisphosphoglycerate',prodFull:'2 \u00d7 3-Phosphoglycerate (3-PG)',subC:'3C\u00d72',prodC:'3C\u00d72',
   rxn:'2 (1,3-BPG) + 2 ADP \u2192 2 (3-PG) + 2 ATP',
   detail:'First ATP payoff via substrate-level phosphorylation. The high-energy acyl-phosphate of 1,3-BPG is transferred directly to ADP \u2014 no oxidative phosphorylation involved. Generates 2 ATP (1 per triose molecule). This exactly recoups the 2 ATP invested in steps 1 and 3, bringing the net ATP balance to zero. The actual profit (+2 ATP) comes from Pyruvate Kinase at step 10.',
   note:'Substrate-level phosphorylation; 2 ATP produced; net balance = 0 here; profit comes at step 10',
   misconception:'PGK produces ATP by direct phosphate transfer — substrate-level phosphorylation. This is fundamentally different from ATP synthase in the mitochondria.'},
  {id:8,enz:'PGM',prod:'pg2',atp:0,nadh:0,rev:true,phase:'payoff',regulatory:false,
   title:'Phosphate Migration',enzFull:'Phosphoglycerate Mutase (PGM)',
   subFull:'2 \u00d7 3-Phosphoglycerate (3-PG)',prodFull:'2 \u00d7 2-Phosphoglycerate (2-PG)',subC:'3C\u00d72',prodC:'3C\u00d72',
   rxn:'2 (3-PG) \u21cc 2 (2-PG)',
   detail:'PGM moves the phosphate group from C-3 to C-2. This repositioning is essential: the phosphate must be on C-2 so Enolase can dehydrate the adjacent C-3 hydroxyl in the next step, creating the very high-energy phosphate bond of PEP.',
   note:'Mutase: phosphate moves C-3 \u2192 C-2 within same molecule; no energy change',
   misconception:"PGM is a 'mutase' — it moves phosphate within the same molecule. The total phosphate count doesn't change."},
  {id:9,enz:'Enolase',prod:'pep',atp:0,nadh:0,rev:true,phase:'payoff',regulatory:false,
   title:'Dehydration to PEP',enzFull:'Enolase',
   subFull:'2 \u00d7 2-Phosphoglycerate (2-PG)',prodFull:'2 \u00d7 Phosphoenolpyruvate (PEP)',subC:'3C\u00d72',prodC:'3C\u00d72',
   rxn:'2 (2-PG) \u21cc 2 PEP + 2 H\u2082O',
   detail:'Enolase removes a water molecule (dehydration) to create phosphoenolpyruvate (PEP), which has the highest phosphate transfer potential of any common metabolite (\u0394G\u00b0\u2032 = \u221261.9 kJ/mol). Enolase requires Mg\u00b2\u207a. It is inhibited by fluoride: F\u207b + P\u1d62 form fluorophosphate (PO\u2082F\u00b2\u207b), which sequesters Mg\u00b2\u207a and blocks catalysis. This is why NaF is used in blood collection tubes to halt glycolysis.',
   note:'Dehydration; PEP highest phosphate transfer potential; F\u207b inhibits via fluorophosphate\u2013Mg\u00b2\u207a chelation',
   misconception:'Enolase removes H\u2082O (dehydration). The F\u207b inhibition is indirect: fluorophosphate chelates Mg\u00b2\u207a, removing the required cofactor.'},
  {id:10,enz:'PK',prod:'pyruvate',atp:2,nadh:0,rev:false,phase:'payoff',regulatory:false,deltaG:'-31.4',
   title:'Final ATP Generation',enzFull:'Pyruvate Kinase (PK)',
   subFull:'2 \u00d7 Phosphoenolpyruvate (PEP)',prodFull:'2 \u00d7 Pyruvate',subC:'3C\u00d72',prodC:'3C\u00d72',
   rxn:'2 PEP + 2 ADP \u2192 2 Pyruvate + 2 ATP',
   detail:'Final irreversible step (\u0394G = \u221231.4 kJ/mol). Pyruvate Kinase transfers the phosphate from PEP directly to ADP (substrate-level phosphorylation), generating 2 ATP. PK is subject to feed-forward activation by F1,6BP — an elegant coordination mechanism where the product of the committed step (PFK-1) pre-activates the final pay-off enzyme before substrates arrive. Pyruvate then enters the Krebs cycle (aerobic) or undergoes fermentation (anaerobic).',
   note:'Irreversible; feed-forward activation by F1,6BP; pyruvate \u2192 Krebs cycle or fermentation',
   misconception:"Pyruvate Kinase MAKES ATP — it does NOT use it. Despite the name, 'kinase' here means transferring phosphate TO ADP."}
];

var QUIZ=[
  {id:1,cat:'Enzymes & Steps',q:'Which enzyme catalyses the committed and rate-limiting step of glycolysis?',opts:['Hexokinase','Phosphofructokinase-1 (PFK-1)','Pyruvate Kinase','Phosphoglycerate Kinase'],ans:1,exp:'PFK-1 catalyses F6P \u2192 F1,6BP. This is the committed step — F1,6BP is directed exclusively to glycolysis under physiological conditions. PFK-1 is the primary regulatory enzyme. Hexokinase is product-inhibited by G6P, not the main rate-limiter.'},
  {id:2,cat:'Energy Accounting',q:'What is the net gain of ATP per molecule of glucose in glycolysis?',opts:['4 ATP','38 ATP','2 ATP','6 ATP'],ans:2,exp:'Steps 1 and 3 consume 2 ATP (preparatory phase). Steps 7 and 10 each produce 2 ATP (1 per triose \u00d7 2 trioses). Net = 4 \u2212 2 = 2 ATP. The 36\u201338 figure refers to complete aerobic respiration.'},
  {id:3,cat:'Enzyme Properties',q:'Why does phosphorylation of glucose by Hexokinase effectively trap glucose inside the cell?',opts:['Glucose-6-phosphate is too large to exit','The phosphate group adds a negative charge, preventing passage through the non-polar membrane','Hexokinase blocks the glucose transporter','G6P is immediately converted to glycogen'],ans:1,exp:'The phosphate group added by Hexokinase gives G6P a strong negative charge at physiological pH. The plasma membrane\'s hydrophobic lipid bilayer is impermeable to charged molecules, so G6P cannot exit. This is why phosphorylation is the cell\'s primary mechanism for committing glucose to intracellular metabolism.'},
  {id:4,cat:'NADH Production',q:'Which enzyme in glycolysis is the ONLY one that produces NADH?',opts:['PGK \u2014 Step 7','GAPDH \u2014 Step 6','Pyruvate Kinase \u2014 Step 10','PFK-1 \u2014 Step 3'],ans:1,exp:'GAPDH (step 6) oxidises G3P, reducing NAD\u207a \u2192 NADH. This is the ONLY redox step in glycolysis. 2 NADH are produced per glucose (1 per G3P \u00d7 2 G3P molecules). These are cytoplasmic NADH.'},
  {id:5,cat:'Regulatory Mechanisms',q:"Which molecule is the most potent allosteric activator of PFK-1?",opts:['ATP','Citrate','Fructose-2,6-Bisphosphate (F2,6BP)','Glucose-6-Phosphate'],ans:2,exp:'F2,6BP is the most potent activator of PFK-1, synthesised by PFK-2 under insulin signalling. AMP and ADP also activate PFK-1. ATP and citrate inhibit it (signalling that energy levels and biosynthetic intermediates are already high).'},
  {id:6,cat:'Substrate & Products',q:'Aldolase cleaves fructose-1,6-bisphosphate into which two products?',opts:['2 \u00d7 Pyruvate','G6P and F6P','DHAP and Glyceraldehyde-3-Phosphate (G3P)','2 \u00d7 1,3-Bisphosphoglycerate'],ans:2,exp:'Aldolase cleaves the C3\u2013C4 bond: DHAP from C1\u2013C3, and G3P from C4\u2013C6. DHAP is then isomerised to G3P by TPI (step 5).'},
  {id:7,cat:'Enzymes & Steps',q:'Which enzyme is described as "catalytically perfect" and operates near the diffusion limit?',opts:['Hexokinase','Pyruvate Kinase','Triose Phosphate Isomerase (TPI)','Enolase'],ans:2,exp:'TPI has a k_cat/K_M near the theoretical diffusion limit (~10\u2078 M\u207b\u00b9s\u207b\u00b9). Without TPI, the DHAP from Aldolase would be wasted and glucose efficiency would be halved.'},
  {id:8,cat:'Irreversibility',q:'Which correctly lists all THREE physiologically irreversible steps of glycolysis?',opts:['Steps 1, 2, 10','Steps 1, 3, 10','Steps 3, 6, 10','Steps 1, 6, 9'],ans:1,exp:'Steps 1 (Hexokinase, \u0394G = \u221216.7 kJ/mol), 3 (PFK-1, \u0394G = \u221214.2 kJ/mol), and 10 (Pyruvate Kinase, \u0394G = \u221231.4 kJ/mol) are the three irreversible steps under cellular conditions.'},
  {id:9,cat:'Substrate-Level Phosphorylation',q:'Which enzyme performs substrate-level phosphorylation to generate the FIRST ATP in glycolysis?',opts:['Hexokinase','Pyruvate Kinase','Phosphoglycerate Kinase (PGK)','GAPDH'],ans:2,exp:'PGK (step 7) transfers the high-energy acyl-phosphate from 1,3-BPG directly to ADP — substrate-level phosphorylation. Hexokinase consumes ATP. Pyruvate Kinase produces the second 2 ATP at step 10.'},
  {id:10,cat:'Coenzymes & Cofactors',q:'In the GAPDH reaction, what type of high-energy bond is formed in 1,3-BPG?',opts:['Ester bond','Acyl-phosphate (mixed anhydride) bond','Glycosidic bond','Peptide bond'],ans:1,exp:'GAPDH adds free P\u1d62 to form an acyl-phosphate (mixed anhydride) bond in 1,3-BPG. This has \u0394G\u00b0\u2032 = \u221249.3 kJ/mol on hydrolysis — more energy-rich than ATP itself, enabling direct phosphate transfer to ADP in the next step.'},
  {id:11,cat:'Metabolic Fate',q:'Under anaerobic conditions, the primary purpose of lactic acid fermentation is:',opts:['Generate more ATP','Regenerate NAD\u207a so glycolysis can continue','Enter the Krebs cycle','Produce acetyl-CoA'],ans:1,exp:'LDH converts pyruvate \u2192 lactate, re-oxidising NADH \u2192 NAD\u207a. Without this NAD\u207a regeneration, GAPDH cannot function and glycolysis halts. No extra ATP is produced — this step purely sustains glycolytic flux.'},
  {id:12,cat:'Enzyme Inhibition',q:'Enolase is inhibited by fluoride (F\u207b). What is the precise mechanism?',opts:['F\u207b blocks the active site directly','F\u207b and P\u1d62 form fluorophosphate, which chelates the essential Mg\u00b2\u207a cofactor','F\u207b oxidises the substrate','F\u207b is a competitive inhibitor with PEP'],ans:1,exp:'F\u207b + P\u1d62 \u2192 fluorophosphate (PO\u2082F\u00b2\u207b), which sequesters the Mg\u00b2\u207a required for catalysis. This is why NaF is added to blood glucose tubes — it stops glycolysis and prevents falsely low glucose readings.'}
];

/* ── HELPERS ── */
function cx(){return Array.from(arguments).filter(Boolean).join(' ');}

function mkArrow(s,l,op){
  op=op===undefined?1:op;
  var x1,y1,x2,y2;
  if(s===8){x1=l.sx-14;y1=l.sy+14;x2=l.px+14;y2=l.py-14;}
  else if(l.vert){x1=l.sx+16;y1=l.sy+14;x2=l.px-16;y2=l.py-14;}
  else if(s<=3||s>=9){x1=l.sx+18;y1=l.sy;x2=l.px-18;y2=l.py;}
  else{x1=l.sx-18;y1=l.sy;x2=l.px+18;y2=l.py;}
  return h('line',{x1:x1,y1:y1,x2:x2,y2:y2,stroke:'#fbbf24',strokeWidth:2.5,markerEnd:'url(#ar)',opacity:op});
}

/* ── MOLECULE ── */
function Mol(p){
  var m=MOLS[p.type]; if(!m) return null;
  var cls=p.cls||'';
  var isHex=['glucose','g6p','f6p','f16bp'].indexOf(p.type)>=0;
  if(isHex){
    var p1=['g6p','f6p','f16bp'].indexOf(p.type)>=0,p2=p.type==='f16bp';
    var dots=[0,1,2,3,4,5].map(function(i){var a=(i*60-90)*Math.PI/180;return h('circle',{key:i,cx:Math.cos(a)*7.5,cy:Math.sin(a)*7.5,r:2.5,fill:'rgba(255,255,255,0.6)'}); });
    var ch=[h('polygon',{points:'0,-12 11,-6 11,6 0,12 -11,6 -11,-6',fill:m.col,stroke:'rgba(255,255,255,0.3)',strokeWidth:1,opacity:0.9})].concat(dots);
    if(p1) ch.push(h('circle',{key:'p1',cx:-15,cy:-5,r:4,fill:'#fbbf24',stroke:'#d97706',strokeWidth:0.5}));
    if(p2) ch.push(h('circle',{key:'p2',cx:15,cy:-5,r:4,fill:'#fbbf24',stroke:'#d97706',strokeWidth:0.5}));
    return h('g',{transform:'translate('+p.x+','+p.y+')',className:cls},ch);
  }
  var isSim=p.type==='pyruvate';
  function chain(ox,hp){
    hp=hp!==false;

/* ── APP ── */
function App(){

  var _hi=useState(true),hints=_hi[0],setHints=_hi[1];
  var _to=useState(null),toast=_to[0],setToast=_to[1];
  var _sk=useState(null),shk=_sk[0],setShk=_sk[1];
  var _au=useState(false),auto=_au[0],setAuto=_au[1];
  var _spd=useState(1),spd=_spd[0],setSpd=_spd[1];
  var _lc=useState(null),lc=_lc[0],setLc=_lc[1];
  var _sh=useState(false),showHelp=_sh[0],setShowHelp=_sh[1];
  var _st=useState(false),showSum=_st[0],setShowSum=_st[1];
  var _dr=useState(false),drawerOpen=_dr[0],setDrawerOpen=_dr[1];
  var _qa=useState({}),qans=_qa[0],setQans=_qa[1];
  var _str=useState(0),streak=_str[0],setStreak=_str[1];
  var _af=useState(null),atpFloat=_af[0],setAtpFloat=_af[1];

  var _wo=useState(false),wrongOnly=_wo[0],setWrongOnly=_wo[1];
  var _sc=useState(false),showCompare=_sc[0],setShowCompare=_sc[1];
  var _cs2=useState(null),compareStep=_cs2[0],setCompareStep=_cs2[1];
  /* Shuffled orders for practice mode */
  var _eo=useState(Object.keys(ENZS)),enzOrder=_eo[0],setEnzOrder=_eo[1];
  var _po=useState(Object.keys(MOLS).filter(function(k){return k!=='glucose';})),prodOrder=_po[0],setProdOrder=_po[1];
  var autoR=useRef(null),toastR=useRef(null),timerR=useRef(null);

  var energy=useMemo(function(){
    return Array.from(done).reduce(function(acc,id){

    },{atp:0,nadh:0});
  },[done]);

  var sd=cs>0?STEPS[cs-1]:null;

  /* Keyboard shortcuts */

        if(e.key==='ArrowLeft'){e.preventDefault();goBack();}

  /* Fisher-Yates shuffle */
  function shuffle(arr){
    var a=arr.slice();
    for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}

  var submitProd=useCallback(function(){

      var n=Object.assign({},prev);n[cs]=Object.assign({},prev[cs],{productCorrect:ok});
      if(ok) saveProgress(null,n);

    if(ok){
      setDone(function(prev){return new Set([].concat(Array.from(prev),[cs]));});

  var dispS=cs>0?STEPS[cs-1]:STEPS[0];

  /* ── localStorage persistence ── */

  function saveProgress(newQans,newPst){

      var steps=Object.keys(newPst||pst).length;

      scores.quizAnswered=Math.max(scores.quizAnswered||0,Object.keys(newQans||qans).length);

  var savedProgress=useMemo(function(){

          h('div',{className:'mode-card mc-quiz',onClick:function(){startMode('quiz');}},
            h('div',{className:'mc-icon'},'\ud83c\udf93'),h('div',{className:'mc-title'},'Quiz'),

          h('div',{className:'cs'},h('div',{className:'cs-val',style:{color:'var(--accent)'}},'+2'),h('div',{className:'cs-lbl'},'NADH*'))
        ),
        Object.keys(pst).length>0&&h('div',{style:{background:'rgba(34,211,238,.08)',border:'1px solid rgba(34,211,238,.2)',borderRadius:8,padding:12,marginBottom:12,textAlign:'left',fontSize:11}},

    h('button',{key:'hp',className:'btn',onClick:function(){setShowHelp(true);}},mode==='practice'?'\u2753 How to Play':'\u2753 Help'),
    allDone&&h('button',{key:'sm',className:'btn',onClick:function(){setShowSum(true);}},'\ud83d\udcca All Steps'),
    mode==='learn'&&h('button',{key:'bk',className:'btn',onClick:goBack,disabled:cs<=1},'\u25c4 Back'),
    mode==='learn'&&allDone&&cs>1&&h('button',{key:'cmp',className:'btn',style:{borderColor:'rgba(167,139,250,.4)',color:'#a78bfa'},onClick:function(){setShowCompare(!showCompare);setCompareStep(cs>1?cs-1:null);}},showCompare?'\u00d7 Compare':'Compare Steps'),
    mode==='practice'&&h('label',{key:'hi',className:'hint-ctrl'},
      h('input',{type:'checkbox',checked:hints,onChange:function(ev){setHints(ev.target.checked);}}),
      '\ud83d\udca1 Hints'
    ),
    mode==='practice'&&streak>=3&&h('div',{key:'str',className:'streak-badge'},'\ud83d\udd25 '+streak+' streak'),
    mode==='learn'&&h('button',{key:'nx',className:'btn primary',onClick:advance},
      cs===0?'Start \u2192':cs<10?'Next Step \u2192':'\ud83c\udf89 Finish!'
    ),
    mode==='practice'&&cs===0&&h('button',{key:'st',className:'btn primary',onClick:function(){setCs(1);}}, 'Start \u2192'),
    mode==='practice'&&stepOk&&h('button',{key:'pn',className:'btn primary',onClick:practNext},cs<10?'Next \u2192':'\ud83c\udf89 Done!')
  ].filter(Boolean);

  /* The two-column layout: left sidebar (enzymes) + wide centre */
  /* Products now appear as a collapsible/fixed right section inside centre column */
  return h('div',{className:'app'},
    helpOv,
    showSum&&summaryOverlay(),

    /* Left sidebar: enzymes */
    h('div',{className:'sidebar'},
      h('div',{className:'sb-head'},'\u2697 Enzymes'),
      h('div',{className:'sb-body'},enzList)
    ),

    /* Centre + right-inset products */
    h('div',{style:{display:'flex',flex:1,overflow:'hidden'}},

      /* Main centre column */
      h('div',{className:'center',style:{flex:1}},
        banner,
        drawerToggle,
        drawer,
        mode==='practice'&&practStrip,
        h('div',{className:'play-area'},
          svgEl,
          toast&&h('div',{className:'toast '+toast.t},toast.m),
          atpFloat&&h('div',{className:'atp-float '+(atpFloat.pos?'pos':'neg'),style:{top:'20%'}},atpFloat.val)
        ),
        h('div',{className:'progress-bar'},
          h('span',{className:'prog-label'},'Steps'),
          h('div',{className:'prog-dots'},dots),
          h('span',{className:'prog-label'},cs+'/10'),
          mode==='learn'&&cs>0&&h('span',{style:{fontSize:9,color:'var(--muted)',marginLeft:8}},'\u2190\u2192 or click dots to jump')
        ),
        /* ATP balance mini-graph */
        (mode==='learn'||mode==='practice')&&cs>0&&h('div',{className:'energy-graph'},
          h('span',{className:'eg-label'},'ATP Balance'),
          h('div',{style:{display:'flex',alignItems:'center',gap:4,flex:1}},
            h('div',{style:{display:'flex',flexDirection:'column',justifyContent:'space-between',height:28,flexShrink:0,fontFamily:'var(--mono)',fontSize:7,color:'var(--muted)',textAlign:'right',lineHeight:1}},
              h('span',{style:{color:'#f87171'}},'-2'),
              h('span',null,'0'),
              h('span',{style:{color:'#4ade80'}},'+2')
            ),
            h('svg',{className:'eg-svg',viewBox:'0 0 210 28',preserveAspectRatio:'none'},
              h('line',{x1:0,y1:14,x2:210,y2:14,stroke:'rgba(255,255,255,0.12)',strokeWidth:0.5}),
              Array.from(done).sort(function(a,b){return a-b;}).map(function(sid,i){
                var runAtp=Array.from(done).filter(function(x){return x<=sid;}).reduce(function(s,x){return s+(STEPS[x-1]?STEPS[x-1].atp:0);},0);
                var barH=Math.max(Math.abs(runAtp)*5,1);
                var isPos=runAtp>=0;
                var bx=i*21;
                var by=isPos?(14-barH):14;
                return h('rect',{key:sid,x:bx,y:by,width:18,height:barH,rx:2,fill:isPos?'#4ade80':'#f87171',opacity:0.85});
              })
            )
          )
        ),
        h('div',{className:'controls'},ctls),
        /* ── Compare Steps panel ── */
        showCompare&&cs>1&&mode==='learn'&&(function(){
          var stepA=compareStep&&STEPS[compareStep-1]?STEPS[compareStep-1]:STEPS[cs-2];
          var stepB=STEPS[cs-1];
          if(!stepA||!stepB) return null;
          var diff=[];
          if(stepA.phase!==stepB.phase) diff.push('Phase changes: '+stepA.phase+' \u2192 '+stepB.phase);
          if(stepA.rev!==stepB.rev) diff.push(!stepB.rev?'Step '+stepB.id+' is IRREVERSIBLE; step '+stepA.id+' is reversible':'Step '+stepB.id+' is reversible; step '+stepA.id+' is irreversible');
          if(stepA.atp!==stepB.atp) diff.push('ATP: '+( stepA.atp>0?'+':'')+stepA.atp+' vs '+(stepB.atp>0?'+':'')+stepB.atp);
          if(stepA.nadh!==stepB.nadh) diff.push('NADH: +'+(stepA.nadh)+' vs +'+(stepB.nadh));
          if(stepA.subC!==stepB.subC||stepA.prodC!==stepB.prodC) diff.push('Carbon: '+stepA.subC+'\u2192'+stepA.prodC+' vs '+stepB.subC+'\u2192'+stepB.prodC);
          return h('div',{className:'compare-panel',style:{margin:'0 20px 8px',flexShrink:0}},
            h('div',{style:{fontSize:10,fontWeight:700,color:'var(--muted)',letterSpacing:'1px',textTransform:'uppercase',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}},
              'Step comparison',
              h('div',{style:{display:'flex',gap:6}},
                [1,2,3,4,5,6,7,8,9].filter(function(n){return n!==cs;}).map(function(n){
                  return h('button',{key:n,className:'btn',style:{padding:'2px 7px',fontSize:9,background:compareStep===n?'rgba(167,139,250,.2)':''},onClick:function(){setCompareStep(n);}},n);
                })
              )
            ),
            h('div',{className:'compare-row'},
              h('div',{className:'compare-cell'},
                h('div',{className:'cc-step'},'Step '+stepA.id),
                h('div',{className:'cc-title'},stepA.title),
                h('div',{className:'cc-row'},h('strong',null,'Enzyme'),stepA.enzFull),
                h('div',{className:'cc-row'},h('strong',null,'Carbons'),stepA.subC+' \u2192 '+stepA.prodC),
                h('div',{className:'cc-row'},h('strong',null,'Energy'),(stepA.atp!==0?(stepA.atp>0?'+':'')+stepA.atp+' ATP ':'')+(stepA.nadh>0?'+'+stepA.nadh+' NADH':'')||'\u2014'),
                h('div',{className:'cc-row'},h('strong',null,'Reversible'),stepA.rev?'\u2713 Yes':'\u00d7 No (\u0394G='+stepA.deltaG+' kJ/mol)')
              ),
              h('div',{className:'compare-cell'},
                h('div',{className:'cc-step'},'Step '+stepB.id),
                h('div',{className:'cc-title'},stepB.title),
                h('div',{className:'cc-row'},h('strong',null,'Enzyme'),stepB.enzFull),
                h('div',{className:'cc-row'},h('strong',null,'Carbons'),stepB.subC+' \u2192 '+stepB.prodC),
                h('div',{className:'cc-row'},h('strong',null,'Energy'),(stepB.atp!==0?(stepB.atp>0?'+':'')+stepB.atp+' ATP ':'')+(stepB.nadh>0?'+'+stepB.nadh+' NADH':'')||'\u2014'),
                h('div',{className:'cc-row'},h('strong',null,'Reversible'),stepB.rev?'\u2713 Yes':'\u00d7 No (\u0394G='+stepB.deltaG+' kJ/mol)')
              )
            ),
            diff.length>0&&h('div',{className:'compare-diff'},h('strong',{style:{color:'var(--accent)'}},'Key differences: '),diff.join(' \u00b7 '))
          );
        })()
      ),

      /* Right inset: products (180px, always visible) */
      h('div',{style:{width:195,background:'var(--panel)',borderLeft:'1px solid var(--border)',display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}},
        h('div',{className:'sb-head'},'\ud83e\uddec Products'),
        h('div',{className:'sb-body'},makeProdList(true))
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
</script>
</body>
</html>
